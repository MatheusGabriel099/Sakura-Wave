<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se Aqui!</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="shortcut icon" href="imagem/logo.png" type="image/x-icon">
</head>

<body>
    <main>
        <div class="container">
            <div class="div-esquerda">
                <h1>Crie sua Conta</h1>
                <p>Cadastre-se para acessar nossa plataforma e aproveitar todos os recursos disponíveis.</p>
            </div>

            <div class="div-direita">
                <h2>Cadastro</h2>

                <form action="">
                    <div class="dados">
                        <div class="form-group">
                            <input type="text" placeholder="Nome" required>
                        </div>

                        <div class="form-group">
                            <input type="text" placeholder="Sobrenome" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <input type="email" placeholder="E-mail" required>
                    </div>

                    <div class="form-group">
                        <input type="text" placeholder="Usuário" required>
                    </div>

                    <div class="dados">
                        <div class="form-group">
                            <input type="password" placeholder="Senha" required>
                        </div>

                        <div class="form-group">
                            <input type="password" placeholder="Corfirmar senha" required>
                        </div>
                    </div>

                    <button class="btn">Criar conta</button>
                </form>

                <div class="links">
                    <a href="form.html">Já tenho uma conta</a>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
