<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupere sua Senha</title>
    <link rel="stylesheet" href="senha.css">
    <link rel="shortcut icon" href="imagem/logo.png" type="image/x-icon">
</head>

<body>
    <main>
        <div class="container">
            <div class="div-text">
                <h2>Recupere sua senha</h2>
                <p>Parece que você esqueceu sua senha! Sem problemas,<br> vamos te ajudar a voltar para a sua conta
                    rapidinho.</p>
            </div>

            <div class="div-form">
                <form action="">

                    <h2>Esqueci minha senha</h2>
                    <div class="input-group">
                        <input type="email" placeholder="Digite seu e-mail" required>
                    </div>

                </form>

                <button class="btn-recuperar">
                    Enviar e-mail de Recuperação
                </button>

                <div class="links">
                    <a href="form.html">Voltar para Login</a>
                </div>

            </div>
        </div>
    </main>

</body>

</html>
